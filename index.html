<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Soccer FC Mejorado</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

canvas{
    display:block;
    background:#43a047;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#0d47a1,#1b5e20);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:10;
}

button{
    padding:20px 40px;
    font-size:28px;
    border:none;
    border-radius:10px;
    margin:10px;
    cursor:pointer;
    background:#00c853;
    color:white;
}

</style>
</head>

<body>

<div id="menu">

<h1>SOCCER FC</h1>

<h2>Selecciona un equipo</h2>

<button onclick="startGame('mexico')">
México 🇲🇽
</button>

<button onclick="startGame('usa')">
USA 🇺🇸
</button>

<p>
Mover = Flechas<br>
Cambiar jugador = ESPACIO<br>
Patear = Z
</p>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameStarted = false;

let keys = {};

document.addEventListener("keydown",(e)=>{

    keys[e.key.toLowerCase()] = true;

    if(e.code === "Space"){

        e.preventDefault();

        switchPlayer();

    }

});

document.addEventListener("keyup",(e)=>{

    keys[e.key.toLowerCase()] = false;

});

let scoreMexico = 0;
let scoreUSA = 0;

class Player{

    constructor(x,y,color,team){

        this.x = x;
        this.y = y;

        this.color = color;

        this.team = team;

        this.speed = 4;

        this.selected = false;

    }

    draw(){

        // sombra
        ctx.beginPath();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.ellipse(this.x,this.y+28,18,7,0,0,Math.PI*2);
        ctx.fill();

        // piernas
        ctx.strokeStyle = "black";
        ctx.lineWidth = 4;

        ctx.beginPath();
        ctx.moveTo(this.x-8,this.y+20);
        ctx.lineTo(this.x-12,this.y+42);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x+8,this.y+20);
        ctx.lineTo(this.x+12,this.y+42);
        ctx.stroke();

        // cuerpo
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x-15,this.y-10,30,40);

        // brazos
        ctx.beginPath();
        ctx.moveTo(this.x-15,this.y);
        ctx.lineTo(this.x-28,this.y+10);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x+15,this.y);
        ctx.lineTo(this.x+28,this.y+10);
        ctx.stroke();

        // cabeza
        ctx.beginPath();
        ctx.fillStyle = "#f1c27d";
        ctx.arc(this.x,this.y-25,16,0,Math.PI*2);
        ctx.fill();

        // ojos
        ctx.fillStyle = "black";

        ctx.beginPath();
        ctx.arc(this.x-5,this.y-28,2,0,Math.PI*2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x+5,this.y-28,2,0,Math.PI*2);
        ctx.fill();

        // selección
        if(this.selected){

            ctx.beginPath();
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 3;
            ctx.arc(this.x,this.y,28,0,Math.PI*2);
            ctx.stroke();

        }

    }

    move(){

        if(!this.selected) return;

        if(keys["arrowup"]) this.y -= this.speed;
        if(keys["arrowdown"]) this.y += this.speed;
        if(keys["arrowleft"]) this.x -= this.speed;
        if(keys["arrowright"]) this.x += this.speed;

        // límites
        this.x = Math.max(40,Math.min(canvas.width-40,this.x));
        this.y = Math.max(40,Math.min(canvas.height-40,this.y));

    }

}

class Ball{

    constructor(){

        this.reset();

    }

    reset(){

        this.x = canvas.width/2;
        this.y = canvas.height/2;

        this.vx = 0;
        this.vy = 0;

    }

    draw(){

        // balón realista

        ctx.beginPath();
        ctx.fillStyle = "white";
        ctx.arc(this.x,this.y,12,0,Math.PI*2);
        ctx.fill();

        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.stroke();

        // detalles
        ctx.beginPath();
        ctx.moveTo(this.x-5,this.y-5);
        ctx.lineTo(this.x+5,this.y+5);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x+5,this.y-5);
        ctx.lineTo(this.x-5,this.y+5);
        ctx.stroke();

    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.98;
        this.vy *= 0.98;

        // rebotes
        if(this.y < 20 || this.y > canvas.height-20){

            this.vy *= -1;

        }

        // goles

        if(
            this.x < 30 &&
            this.y > canvas.height/2-100 &&
            this.y < canvas.height/2+100
        ){

            scoreUSA++;

            speak("Gol de USA");

            this.reset();

        }

        if(
            this.x > canvas.width-30 &&
            this.y > canvas.height/2-100 &&
            this.y < canvas.height/2+100
        ){

            scoreMexico++;

            speak("Gol de México");

            this.reset();

        }

        if(this.x < 20 || this.x > canvas.width-20){

            this.vx *= -1;

        }

    }

}

const ball = new Ball();

let mexico = [];
let usa = [];

function createTeams(){

    mexico = [];
    usa = [];

    // MÉXICO
    for(let i=0;i<8;i++){

        mexico.push(
            new Player(
                200 + (i%2)*120,
                120 + i*70,
                "#00e676",
                "mexico"
            )
        );

    }

    // USA
    for(let i=0;i<8;i++){

        usa.push(
            new Player(
                canvas.width-200 - (i%2)*120,
                120 + i*70,
                "#2979ff",
                "usa"
            )
        );

    }

    mexico[0].selected = true;

}

function switchPlayer(){

    let current = mexico.findIndex(p=>p.selected);

    mexico[current].selected = false;

    current++;

    if(current >= mexico.length){

        current = 0;

    }

    mexico[current].selected = true;

}

function moveAI(){

    usa.forEach(player=>{

        // IA simple sigue balón

        let dx = ball.x - player.x;
        let dy = ball.y - player.y;

        let dist = Math.sqrt(dx*dx+dy*dy);

        if(dist > 5){

            player.x += dx/dist * 1.5;
            player.y += dy/dist * 1.5;

        }

        // patear

        if(dist < 40){

            ball.vx = -8;
            ball.vy = (Math.random()-0.5)*8;

        }

    });

}

function drawField(){

    ctx.fillStyle = "#43a047";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;

    // límites
    ctx.strokeRect(
        20,
        20,
        canvas.width-40,
        canvas.height-40
    );

    // medio
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,20);
    ctx.lineTo(canvas.width/2,canvas.height-20);
    ctx.stroke();

    // círculo central
    ctx.beginPath();
    ctx.arc(
        canvas.width/2,
        canvas.height/2,
        100,
        0,
        Math.PI*2
    );
    ctx.stroke();

    // porterías
    ctx.strokeRect(20,canvas.height/2-100,60,200);
    ctx.strokeRect(canvas.width-80,canvas.height/2-100,60,200);

}

function update(){

    mexico.forEach(player=>player.move());

    moveAI();

    ball.update();

    // jugador seleccionado

    let player = mexico.find(p=>p.selected);

    let dx = ball.x-player.x;
    let dy = ball.y-player.y;

    let dist = Math.sqrt(dx*dx+dy*dy);

    // control del balón

    if(dist < 45){

        // el balón sigue jugador
        ball.x += dx * -0.08;
        ball.y += dy * -0.08;

        // disparo

        if(keys["z"]){

            ball.vx = 12;
            ball.vy = 0;

            speak("Disparo");

        }

    }

}

function draw(){

    drawField();

    ball.draw();

    mexico.forEach(player=>player.draw());

    usa.forEach(player=>player.draw());

    // marcador

    ctx.fillStyle = "white";
    ctx.font = "40px Arial";

    ctx.fillText(
        `México ${scoreMexico} - ${scoreUSA} USA`,
        canvas.width/2-180,
        50
    );

}

function loop(){

    if(!gameStarted) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    update();

    draw();

    requestAnimationFrame(loop);

}

function speak(text){

    if(!window.speechSynthesis) return;

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "es-ES";

    speechSynthesis.speak(speech);

}

function startGame(team){

    document.getElementById("menu").style.display = "none";

    createTeams();

    gameStarted = true;

    loop();

}

</script>

</body>
</html>
